<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/elitech/admin/admin.css">
</head>
<body class="admin-body">
  <!-- Loading Overlay -->
  <div class="admin-loading-overlay" id="loading-overlay">
    <div class="loader-container">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Login View -->
  <section id="login-view" class="login-view is-active" style="display: flex;">
    <div class="login-container">
      <!-- Left Panel: Login Form -->
      <div class="login-panel">
        <div class="login-card">
          <!-- Brand -->
          <div class="login-brand">
            <svg class="brand-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
              <rect width="40" height="40" rx="8" fill="#111827"/>
              <text x="20" y="26" font-family="system-ui" font-size="20" font-weight="bold" fill="white" text-anchor="middle">ET</text>
            </svg>
          </div>

          <!-- Heading -->
          <div class="login-heading">
            <h1>Welcome</h1>
          </div>

          <!-- Google Sign-In Button -->
          <button type="button" id="btn-google-signin" class="btn-google">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
          </button>

          <!-- Divider -->
          <div class="login-divider">or</div>

          <!-- Email/Password Form -->
          <form id="email-password-form" class="login-form">
            <div class="form-group">
              <label for="email-input">Email</label>
              <input type="email" id="email-input" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
              <div class="form-group-header">
                <label for="password-input">Password</label>
                <button type="button" id="btn-forgot-password" class="link-button">Forgot?</button>
              </div>
              <input type="password" id="password-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary">
              <span class="btn-text">Sign in</span>
            </button>
          </form>

          <!-- Status Messages -->
          <div id="status" class="auth-status" style="display: none;"></div>
        </div>
      </div>

      <!-- Right Panel: Visual -->
      <div class="visual-panel">
        <div class="visual-bg"></div>
        <div class="visual-shapes">
          <div class="shape s1"></div>
          <div class="shape s2"></div>
          <div class="shape s3"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Dashboard View -->
  <section id="dashboard-view" class="dashboard-view">
    <header class="dashboard-header">
      <div class="header-left">
        <div class="brand-icon"></div>
        <span>Admin Panel</span>
      </div>
      <div class="header-right">
        <span id="user-email"></span>
        <button id="btn-logout" class="btn-logout">Logout</button>
      </div>
    </header>

    <main class="dashboard-content">
      <nav class="dashboard-nav">
        <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
        <button class="nav-btn" data-tab="users">Users & Admins</button>
        <button class="nav-btn" data-tab="logs">Audit Logs</button>
      </nav>

      <div class="dashboard-tabs">
        <section id="tab-dashboard" class="tab-panel active">
          <div class="panel-header">
            <h2>Dashboard</h2>
          </div>
          <p>Welcome to the admin panel</p>
        </section>

        <section id="tab-users" class="tab-panel">
          <div class="panel-header">
            <h2>Users & Admins</h2>
          </div>
          <div id="admin-users-list"></div>
        </section>

        <section id="tab-logs" class="tab-panel">
          <div class="panel-header">
            <h2>Audit Logs</h2>
          </div>
          <div id="logs-container"></div>
        </section>
      </div>
    </main>
  </section>

  <script type="module" src="/elitech/admin/firebase-email-auth.js"></script>
  <script type="module" src="/elitech/admin/admin.js"></script>
</body>
</html>
